<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Reset Password - MendAI</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      width: 90%;
      max-width: 380px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
      color: #111827;
    }

    p {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
    }

    .input-box {
      text-align: left;
      margin-top: 15px;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      color: #374151;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      padding-right: 40px;
      font-size: 15px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #3ecf8e;
      box-shadow: 0 0 0 2px rgba(62,207,142,0.2);
    }

    input:disabled {
      background: #f9fafb;
      cursor: not-allowed;
    }

    .eye {
      position: absolute;
      right: 10px;
      top: 34px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .submit {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      background: #3ecf8e;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    .submit:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .message {
      display: none;
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.4;
    }

    .success {
      display: block;
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    .error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Reset Password</h2>

    <p id="statusText">Checking your reset link...</p>

    <div class="input-box">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="Enter new password" disabled />
      <button class="eye" type="button" onclick="togglePassword('newPassword', this)">👁️</button>
    </div>

    <div class="input-box">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm new password" disabled />
      <button class="eye" type="button" onclick="togglePassword('confirmPassword', this)">👁️</button>
    </div>

    <button id="submitBtn" class="submit" onclick="updatePassword()" disabled>
      Please Wait...
    </button>

    <div id="messageBox" class="message"></div>
  </div>

  <script>
    /*
      YAHAN APNI SUPABASE DETAILS LAGANI HAIN
    */

    const SUPABASE_URL = "https://cvsvgufcupscsyalgnvl.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_rW_g0Diq0QXbMcbeahxS6g_3R-_PEEB";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const statusText = document.getElementById("statusText");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("messageBox");

    window.onload = async function () {
      await checkResetLink();
    };

    async function checkResetLink() {
      try {
        const queryParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.substring(1));

        const code = queryParams.get("code");

        const accessToken = hashParams.get("access_token");
        const refreshToken = hashParams.get("refresh_token");

        /*
          Case 1:
          Link has ?code=xxxx
        */
        if (code) {
          const { data, error } = await supabaseClient.auth.exchangeCodeForSession(code);

          if (error) {
            throw error;
          }

          if (!data.session) {
            throw new Error("Session not created.");
          }

          enableForm();
          return;
        }

        /*
          Case 2:
          Link has #access_token=xxxx&refresh_token=xxxx
        */
        if (accessToken && refreshToken) {
          const { data, error } = await supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });

          if (error) {
            throw error;
          }

          if (!data.session) {
            throw new Error("Session not created.");
          }

          enableForm();
          return;
        }

        /*
          Case 3:
          Supabase automatically detects session from URL
        */
        const { data } = await supabaseClient.auth.getSession();

        if (data && data.session) {
          enableForm();
          return;
        }

        throw new Error("Invalid or expired reset link.");

      } catch (error) {
        console.log("Reset link error:", error);

        statusText.innerText = "Reset link is invalid or expired.";

        showMessage(
          "This reset link is invalid or expired. Please request a new password reset link from the app.",
          "error"
        );

        disableForm();
      }
    }

    function enableForm() {
      statusText.innerText = "Link verified. Please enter your new password.";

      newPassword.disabled = false;
      confirmPassword.disabled = false;

      submitBtn.disabled = false;
      submitBtn.innerText = "Update Password";

      showMessage("Reset link verified successfully.", "success");
    }

    function disableForm() {
      newPassword.disabled = true;
      confirmPassword.disabled = true;

      submitBtn.disabled = true;
      submitBtn.innerText = "Invalid Link";
    }

    async function updatePassword() {
      const password = newPassword.value.trim();
      const confirm = confirmPassword.value.trim();

      if (password.length < 6) {
        showMessage("Password must be at least 6 characters.", "error");
        return;
      }

      if (password !== confirm) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = "Updating...";

      try {
        const { data, error } = await supabaseClient.auth.updateUser({
          password: password
        });

        if (error) {
          throw error;
        }

        showMessage("Password updated successfully. You can now login in the app.", "success");

        statusText.innerText = "Password updated successfully.";
        submitBtn.innerText = "Updated ✅";

        newPassword.disabled = true;
        confirmPassword.disabled = true;

        setTimeout(async function () {
          await supabaseClient.auth.signOut();
        }, 1000);

      } catch (error) {
        console.log("Update password error:", error);

        showMessage(error.message || "Password update failed.", "error");

        submitBtn.disabled = false;
        submitBtn.innerText = "Update Password";
      }
    }

    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);

      if (input.type === "password") {
        input.type = "text";
        button.innerText = "🙈";
      } else {
        input.type = "password";
        button.innerText = "👁️";
      }
    }

    function showMessage(text, type) {
      messageBox.innerText = text;
      messageBox.className = "message " + type;
    }
  </script>

</body>
</html>
